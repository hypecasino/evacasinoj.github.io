name: Obfuscate JavaScript

on:
  push:
    branches:
      - main 
jobs:
  obfuscate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Obfuscator
        run: npm install -g javascript-obfuscator
      - name: Obfuscate script.js
        run: javascript-obfuscator script.js --config .javascript-obfuscatorrc.json --output script.js
      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add script.js
          git commit -m "Auto-obfuscation of script.js" || echo "No changes to commit"
          git push
